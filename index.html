<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Case v1.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e9e9e9;
            --accent-color: #e94560;
            --rarity-common: #a0a0a0;
            --rarity-rare: #3498db;
            --rarity-legendary: #f1c40f;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #app {
            text-align: center;
            width: 90%;
            max-width: 500px;
        }

        /* --- UI FIX: Увеличиваем основные шрифты --- */
        #main-content {
            font-size: 1.3rem;
        }

        #lock-screen h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        /* --- ЭКРАН БЛОКИРОВКИ --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #lock-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .pin-btn {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            font-size: 1.5rem;
            padding: 20px;
            border-radius: 50%;
            cursor: pointer;
            width: 70px;
            height: 70px;
            transition: background 0.2s;
        }

        .pin-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        #pin-display {
            font-size: 2rem;
            letter-spacing: 10px;
            margin-bottom: 20px;
            height: 2.5rem;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-content {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #main-content.visible {
            opacity: 1;
        }

        .action-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s;
            margin-bottom: 30px;
        }

        .action-btn:active {
            transform: translateY(2px);
        }

        /* --- ВЫВОД ДРОПА (Gacha) --- */
        #drop-area {
            min-height: 200px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .rarity-tag {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            box-shadow: 0 0 10px currentColor;
        }

        /* --- UI FIX: Делаем выводимый текст ОЧЕНЬ крупным --- */
        .drop-text {
            font-size: 2.2rem;
            /* Огромный шрифт */
            line-height: 1.3;
            font-weight: 500;
            margin: 20px 0;
            color: var(--text-color);
            padding: 10px;
        }

        /* Уменьшаем шрифт для медиа-контейнеров, чтобы они влезали */
        .media-container {
            margin-top: 15px;
            width: 100%;
        }

        audio,
        video {
            width: 100%;
            border-radius: 8px;
            outline: none;
        }

        img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

    <div id="lock-screen">
        <h2>Введи наш ПИН-код</h2>
        <div id="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="addPin('1')">1</button>
            <button class="pin-btn" onclick="addPin('2')">2</button>
            <button class="pin-btn" onclick="addPin('3')">3</button>
            <button class="pin-btn" onclick="addPin('4')">4</button>
            <button class="pin-btn" onclick="addPin('5')">5</button>
            <button class="pin-btn" onclick="addPin('6')">6</button>
            <button class="pin-btn" onclick="addPin('7')">7</button>
            <button class="pin-btn" onclick="addPin('8')">8</button>
            <button class="pin-btn" onclick="addPin('9')">9</button>
            <div></div>
            <button class="pin-btn" onclick="addPin('0')">0</button>
            <button class="pin-btn" style="color: var(--accent-color)" onclick="clearPin()">X</button>
        </div>
    </div>

    <div id="app">
        <div id="main-content">
            <button class="action-btn" onclick="openCase()">Открыть кейс</button>
            <div id="drop-area">
            </div>
        </div>
    </div>

        // Глобальные переменные для базы данных
        let database = [];
        let commonPool = [];
        let rarePool = [];
        let legendaryPool = [];

        // --- ГАЧА-ЛОГИКА: ПЕРЕМЕННЫЕ ГАРАНТА (PITY) ---
        let commonStreakCount = 0; // Счётчик выпадений Common подряд

        // --- ЛОГИКА ПИН-КОДА ---
        let currentPin = "";
        const pinDisplay = document.getElementById('pin-display');

        function updatePinDisplay() {
            pinDisplay.textContent = "*".repeat(currentPin.length);
        }

        function addPin(num) {
            if (currentPin.length < EXPECTED_PIN.length) {
                currentPin += num;
                updatePinDisplay();
                if (currentPin.length === EXPECTED_PIN.length) {
                    checkPin();
                }
            }
        }

        function clearPin() {
            currentPin = "";
            updatePinDisplay();
        }

        function checkPin() {
            if (currentPin === EXPECTED_PIN) {
                if (decryptData()) {
                    document.getElementById('lock-screen').classList.add('hidden');
                    document.getElementById('main-content').classList.add('visible');
                } else {
                    alert("Ошибка дешифровки данных. Проверь код.");
                    clearPin();
                }
            } else {
                alert("Неверный ПИН-код. Попробуй ещё раз.");
                clearPin();
            }
        }

        // --- ЛОГИКА ДЕШИФРОВКИ ---
        function decryptData() {
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedDB, EXPECTED_PIN);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                if (!decryptedText) return false;

                database = JSON.parse(decryptedText);
                initializePools();
                return true;
            } catch (e) {
                return false;
            }
        }

        function initializePools() {
            commonPool = [...database.filter(item => item.rarity === 'common')];
            rarePool = [...database.filter(item => item.rarity === 'rare')];
            legendaryPool = [...database.filter(item => item.rarity === 'legendary')];

            shuffle(commonPool);
            shuffle(rarePool);
            shuffle(legendaryPool);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // --- ЛОГИКА ГАЧИ (УЛУЧШЕННАЯ) ---
        const dropArea = document.getElementById('drop-area');

        function openCase() {
            const roll = Math.random();
            let selectedRarity;
            let currentPool;

            // --- ОБРАБОТКА PITY (ГАРАНТА) ---
            if (commonStreakCount >= 5) {
                // Если выпало 5 раз Common подряд, 6-й раз БУДЕТ Rare
                selectedRarity = 'rare';
                currentPool = rarePool;
                commonStreakCount = 0; // Сбрасываем гарант
                console.log("Pity Triggered: Guaranteed Rare!");
            } else {
                // ОБЫЧНЫЙ РОЛЛ (РАНДОМ)
                if (roll < 0.05) { // 5% Legend
                    selectedRarity = 'legendary';
                    currentPool = legendaryPool;
                    commonStreakCount = 0; // Сбрасываем счётчик т.к. выпало не Common
                } else if (roll < 0.30) { // 25% Rare (или чаще если Pity)
                    selectedRarity = 'rare';
                    currentPool = rarePool;
                    commonStreakCount = 0; // Сбрасываем счётчик т.к. выпало не Common
                } else { // 70% Common
                    selectedRarity = 'common';
                    currentPool = commonPool;
                    commonStreakCount++; // Увеличиваем счётчик
                    console.log(`Common Streak: ${commonStreakCount}/5`);
                }
            }

            // --- ПРОВЕРКА ПУЛА ---
            // Если в пуле ничего нет (она открыла всё из этой категории)
            if (currentPool.length === 0) {
                dropArea.innerHTML = `<div style="color:var(--text-color)">В этой категории контент закончился... Попробуй снова.</div>`;
                // Перезаполняем пул из базы, чтобы можно было крутить дальше
                if (selectedRarity === 'common') commonPool = [...database.filter(item => item.rarity === 'common')]; shuffle(commonPool);
                if (selectedRarity === 'rare') rarePool = [...database.filter(item => item.rarity === 'rare')]; shuffle(rarePool);
                if (selectedRarity === 'legendary') legendaryPool = [...database.filter(item => item.rarity === 'legendary')]; shuffle(legendaryPool);
                return;
            }

            const droppedItem = currentPool.pop();
            renderDrop(droppedItem);
        }

        function renderDrop(item) {
            dropArea.innerHTML = ''; // Очищаем старый дроп

            const rarityTag = document.createElement('div');
            rarityTag.className = `rarity-tag rarity-${item.rarity}`;
            rarityTag.textContent = item.rarity;
            if (item.rarity === 'common') rarityTag.style.color = 'var(--rarity-common)';
            if (item.rarity === 'rare') rarityTag.style.color = 'var(--rarity-rare)';
            if (item.rarity === 'legendary') rarityTag.style.color = 'var(--rarity-legendary)';
            dropArea.appendChild(rarityTag);

            if (item.type === 'text') {
                const textDiv = document.createElement('div');
                textDiv.className = 'drop-text'; // Применяем крупный шрифт
                textDiv.textContent = item.content;
                dropArea.appendChild(textDiv);
            } else if (item.type === 'audio') {
                const mediaContainer = document.createElement('div');
                mediaContainer.className = 'media-container';
                mediaContainer.innerHTML = `
                    <div class="drop-text" style="font-size:1.3rem; font-style:italic;">${item.content}</div>
                    <audio controls src="${item.url}"></audio>
                `;
                dropArea.appendChild(mediaContainer);
            } else if (item.type === 'video') {
                const mediaContainer = document.createElement('div');
                mediaContainer.className = 'media-container';
                mediaContainer.innerHTML = `
                    <div class="drop-text" style="font-size:1.3rem; font-style:italic;">${item.content}</div>
                    <video controls autoplay muted src="${item.url}" style="outline:none; border-radius:8px;"></video>
                `;
                dropArea.appendChild(mediaContainer);
            } else if (item.type === 'image') {
                const mediaContainer = document.createElement('div');
                mediaContainer.className = 'media-container';
                mediaContainer.innerHTML = `
                    <div class="drop-text" style="font-size:1.3rem; font-style:italic;">${item.content}</div>
                    <img src="${item.url}" style="width:100%; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.3)"></img>
                `;
                dropArea.appendChild(mediaContainer);
            }
        }
    </script>
