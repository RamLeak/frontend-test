<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emergency Case v1.5 [Final Release]</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --text-color: #e9e9e9;
            --accent-color: #e94560;
            --rarity-common: #a0a0a0;
            --rarity-rare: #3498db;
            --rarity-legendary: #f1c40f;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Prevent scrolling main page, content handles it */
        }

        #app {
            text-align: center;
            width: 95%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }

        /* --- ЭКРАН БЛОКИРОВКИ --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #lock-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #lock-screen h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        .pin-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
        }

        .pin-btn {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            font-size: 1.5rem;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            aspect-ratio: 1;
            /* Keep perfect circle */
            transition: background 0.2s, transform 0.1s;
        }

        .pin-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.95);
        }

        #pin-display {
            font-size: 2.2rem;
            letter-spacing: 10px;
            margin-bottom: 20px;
            height: 2.6rem;
        }

        /* --- ОСНОВНОЙ КОНТЕНТ --- */
        #main-content {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #main-content.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .action-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
            margin-bottom: 25px;
            width: auto;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 8px rgba(233, 69, 96, 0.3);
        }

        /* --- ВЫВОД ДРОПА (Gacha Area) --- */
        #drop-area {
            min-height: 250px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
            /* Allow internal scrolling if content is huge */
            padding: 10px;
        }

        .rarity-tag {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            box-shadow: 0 0 10px currentColor;
            letter-spacing: 1px;
        }

        /* !!! UI FIX: ОЧЕНЬ крупный текст дропа !!! */
        .drop-text {
            font-size: 2.2rem;
            line-height: 1.3;
            font-weight: 500;
            margin: 15px 0;
            color: var(--text-color);
            padding: 10px;
            max-width: 100%;
        }

        /* Медиа-контейнеры (заботимся о размерах) */
        .media-container {
            margin-top: 15px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .media-desc {
            font-size: 1rem;
            color: rgba(233, 233, 233, 0.7);
            font-style: italic;
            margin-bottom: 10px;
        }

        audio {
            width: 100%;
            max-width: 300px;
            border-radius: 4px;
            outline: none;
        }

        /* !!! UI FIX: Нормальный прямоугольный плеер видео !!! */
        video {
            width: 100%;
            max-width: 480px;
            /* Немного шире для прямоугольника */
            max-height: 70vh;
            /* Не занимать весь экран по вертикали */
            border-radius: 12px;
            /* Nicer rectangle */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            outline: none;
            background-color: black;
            object-fit: contain;
            /* Standard video aspect ratio handling */
        }

        img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        /* --- MEDIA QUERIES (Адаптивность) --- */
        /* Планшеты и большие телефоны */
        @media (max-width: 550px) {
            #pin-display {
                font-size: 1.8rem;
            }

            .pin-pad {
                gap: 10px;
            }

            .pin-btn {
                font-size: 1.3rem;
                padding: 12px;
            }

            .drop-text {
                font-size: 1.8rem;
            }
        }

        /* Маленькие телефоны */
        @media (max-width: 375px) {
            #lock-screen h2 {
                font-size: 1.5rem;
            }

            #pin-display {
                font-size: 1.6rem;
                letter-spacing: 8px;
            }

            .pin-btn {
                font-size: 1.2rem;
                padding: 10px;
            }

            .action-btn {
                padding: 12px 30px;
                font-size: 1.1rem;
            }

            .drop-text {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <div id="lock-screen">
        <h2>Введи наш ПИН-код</h2>
        <div id="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="addPin('1')">1</button>
            <button class="pin-btn" onclick="addPin('2')">2</button>

            <button class="pin-btn" onclick="addPin('6')">6</button>
            <button class="pin-btn" onclick="addPin('7')">7</button>
            <button class="pin-btn" onclick="addPin('8')">8</button>
            <button class="pin-btn" onclick="addPin('9')">9</button>
            <div></div>
            <button class="pin-btn" onclick="addPin('0')">0</button>
            <button class="pin-btn" style="color: var(--accent-color)" onclick="clearPin()">X</button>
        </div>
    </div>

    <div id="app">
        <div id="main-content">
            <button class="action-btn" onclick="openCase()">Открыть кейс</button>
            <div id="drop-area">
            </div>
        </div>
    </div>

        let totalCommonCount = 0; // Накопительный счетчик Common неудач

        let currentPin = "";
        const pinDisplay = document.getElementById('pin-display');

        function updatePinDisplay() { pinDisplay.textContent = "*".repeat(currentPin.length); }

        function addPin(num) {
            if (currentPin.length < EXPECTED_PIN.length) {
                currentPin += num;
                updatePinDisplay();
                if (currentPin.length === EXPECTED_PIN.length) { checkPin(); }
            }
        }

        function clearPin() { currentPin = ""; updatePinDisplay(); }

        function checkPin() {
            if (currentPin === EXPECTED_PIN) {
                if (decryptData()) {
                    document.getElementById('lock-screen').classList.add('hidden');

        function decryptData() {
            try {
                const bytes = CryptoJS.AES.decrypt(encryptedDB, EXPECTED_PIN);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);
                if (!decryptedText) return false;

                database = JSON.parse(decryptedText);
                initializePools();
                return true;
            } catch (e) { return false; }
        }

        function initializePools() {
            commonPool = [...database.filter(item => item.rarity === 'common')];
            rarePool = [...database.filter(item => item.rarity === 'rare')];
            legendaryPool = [...database.filter(item => item.rarity === 'legendary')];

            shuffle(commonPool);
            shuffle(rarePool);
            shuffle(legendaryPool);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];

            if (intendsLegendary && lastDroppedRarity === 'legendary') {
                // Если предыдущая была лега, принудительно даем Rare
                selectedRarity = 'rare';
                currentPool = rarePool;
                // Счетчик Common не сбрасываем, т.к. "легу" мы только что заблокировали.
                console.log("Legendary dropped, but locked (was consecutive). Downgraded to Rare.");
            } else if (intendsLegendary) {
                // Лега разрешена (рандом или гарант)
                selectedRarity = 'legendary';
                currentPool = legendaryPool;
                totalCommonCount = 0; // Обнуляем cumulative гарант
                console.log("Legendary dropped (roll or cumulative guarantee). Pity count reset.");
            } else if (roll < 0.30) {
                // 25% шанс на Rare (в диапазоне от 0.05 до 0.30)
                selectedRarity = 'rare';
                currentPool = rarePool;
            } else {
                // 70% шанс на Common (в диапазоне от 0.30 до 1.00)
                selectedRarity = 'common';
                currentPool = commonPool;
                totalCommonCount++; // Накапливаем счетчик неудач
                console.log(`Common dropped. Total Commons collected: ${totalCommonCount}/10`);
            }

            // 3. БЕСШОВНОЕ ОБНОВЛЕНИЕ ПУЛА (Если в колоде контент закончился)
            if (currentPool.length === 0) {
                console.log(`${selectedRarity} pool empty. Silently refilling database.`);
                refillPool(selectedRarity);

                // Переназначаем pool на новый, только что перезаполненный
                if (selectedRarity === 'common') currentPool = commonPool;
                if (selectedRarity === 'rare') currentPool = rarePool;
                if (selectedRarity === 'legendary') currentPool = legendaryPool;
            }

            // 4. Финальная выдача
            const droppedItem = currentPool.pop();
            lastDroppedRarity = selectedRarity; // Память о текущем дропе
            renderDrop(droppedItem);
        }

        // Помощник для бесшовного перезаполнения пулов
        function refillPool(rarity) {
            if (rarity === 'common') { commonPool = [...database.filter(item => item.rarity === 'common')]; shuffle(commonPool); }
            if (rarity === 'rare') { rarePool = [...database.filter(item => item.rarity === 'rare')]; shuffle(rarePool); }
            if (rarity === 'legendary') { legendaryPool = [...database.filter(item => item.rarity === 'legendary')]; shuffle(legendaryPool); }
        }

        function renderDrop(item) {
            dropArea.innerHTML = ''; // Очищаем старый дроп

            const rarityTag = document.createElement('div');
            rarityTag.className = `rarity-tag rarity-${item.rarity}`;
            rarityTag.textContent = item.rarity;
            if (item.rarity === 'common') rarityTag.style.color = 'var(--rarity-common)';
            if (item.rarity === 'rare') rarityTag.style.color = 'var(--rarity-rare)';
            if (item.rarity === 'legendary') rarityTag.style.color = 'var(--rarity-legendary)';
            dropArea.appendChild(rarityTag);

            if (item.type === 'text') {
                const textDiv = document.createElement('div');
                textDiv.className = 'drop-text'; // Очень крупный шрифт
                textDiv.textContent = item.content;
                dropArea.appendChild(textDiv);
            } else if (item.type === 'audio') {
                const mediaContainer = document.createElement('div');
                mediaContainer.className = 'media-container';
                mediaContainer.innerHTML = `
                    <div class="media-desc">${item.content}</div>
                    <audio controls src="${item.url}"></audio>
                `;
                dropArea.appendChild(mediaContainer);
            } else if (item.type === 'video') {
                const mediaContainer = document.createElement('div');
                mediaContainer.className = 'media-container';
                mediaContainer.innerHTML = `
                    <div class="media-desc">${item.content}</div>
                    <video controls autoplay muted src="${item.url}"></video>
                `;
                dropArea.appendChild(mediaContainer);
            } else if (item.type === 'image') {
                const mediaContainer = document.createElement('div');
                mediaContainer.className = 'media-container';
                mediaContainer.innerHTML = `
                    <div class="media-desc">${item.content}</div>
                    <img src="${item.url}"></img>
                `;
                dropArea.appendChild(mediaContainer);
            }
        }
    </script>
</body>

</html>
